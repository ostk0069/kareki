name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Dart ${{ matrix.sdk }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against the minimum supported Dart SDK and the latest
        # stable. Bump `min` when bumping `environment.sdk` in
        # pubspec.yaml.
        sdk: ["3.10.0", "stable"]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ matrix.sdk }}

      - name: Print versions
        run: dart --version

      - name: Resolve dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-warnings

      - name: Run tests
        run: dart test

      - name: Smoke test the CLI
        # Just exercise the binary so build-only failures are caught.
        run: dart run bin/kareki.dart --help

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Resolve dependencies
        run: dart pub get

      - name: Validate package for pub.dev
        # Catches .pubignore gaps, missing LICENSE/README, pub score
        # regressions, and version/CHANGELOG drift before tagging.
        run: dart pub publish --dry-run
