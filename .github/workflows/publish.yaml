name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    permissions:
      # Required for OIDC token exchange with pub.dev. No long-lived
      # `PUB_DEV_PUBLISH_*` secrets are needed.
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev
